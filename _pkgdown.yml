url: https://coeneisma.github.io/pdokr/

template:
  bootstrap: 5
  bslib:
    primary: "#E8631C"          # PDOK orange (buttons, accents)
    link-color: "#B23A0E"       # dark orange links
    link-hover-color: "#E8631C"
    light: "#F7F3EC"            # warm "paper" (the navbar uses .bg-light)

articles:
- title: Articles
  navbar: ~
  contents:
  - '`articles/getting-started`'
  - '`articles/filtering-by-area`'
  - '`articles/coordinate-reference-systems`'
  - '`articles/pdok-by-hand`'

reference:
- title: Search & discovery
  desc: Find datasets and the layers within them.
  contents:
  - pdok_list_datasets
  - pdok_search_datasets
  - pdok_list_layers
  - pdok_search_layers
- title: Loading data
  desc: Read a layer as an sf object.
  contents:
  - pdok_read
- title: Spatial filtering
  desc: Filter a layer by any polygon area.
  contents:
  - pdok_filter_by
- title: Geocoding
  desc: Look up addresses and place names.
  contents:
  - pdok_geocode
